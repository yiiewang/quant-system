# MACD 量化交易系统 - 多周期共振策略配置

# 交易引擎配置
engine:
  mode: "simulation"
  tick_interval: 60
  symbols:
    - "002050.SZ"

# 策略配置 - 多周期共振策略
strategy:
  name: "multi_timeframe"
  params:
    # 标准 MACD 参数 (12/26/9)
    fast_period: 12
    slow_period: 26
    signal_period: 9

    # 多周期过滤条件
    require_monthly_golden: true    # 要求月线金叉
    require_weekly_golden: true     # 要求周线金叉
    exit_on_weekly_death: true      # 周线死叉时退出
    exit_on_monthly_death: true     # 月线死叉时退出

    # 信号强度权重
    monthly_weight: 0.4
    weekly_weight: 0.35
    daily_weight: 0.25

    # 信号过滤
    volume_confirm: true
    volume_ratio: 1.3
    min_data_length: 252

# 风控配置
risk:
  max_position_pct: 0.3
  max_total_position_pct: 0.8
  position_sizing: "equal"

  stop_loss_pct: 0.08
  take_profit_pct: 0.20
  trailing_stop: true
  trailing_stop_pct: 0.05

  max_drawdown_pct: 0.15
  daily_loss_limit: 0.03

# 交易执行配置
broker:
  type: "simulator"
  initial_capital: 1000000

  commission_rate: 0.0003
  min_commission: 5.0
  stamp_duty: 0.001
  slippage: 0.001

# 数据源配置
data:
  provider: "baostock"
  cache:
    enabled: true
    db_path: "data/market.db"
    expire_days: 1

# 回测配置
backtest:
  start_date: "2020-01-01"
  end_date: "2025-12-31"
  benchmark: "000300.SH"
  output_dir: "output/backtest"
  save_trades: true
  generate_report: true
