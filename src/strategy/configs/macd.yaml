# MACD 量化交易系统 - 日线 MACD 策略配置

# 交易引擎配置
engine:
  mode: "simulation"  # simulation | paper | live
  tick_interval: 60   # 秒，行情刷新间隔
  symbols:
    - "000001.SZ"     # 平安银行
    - "600036.SH"     # 招商银行

# 策略配置
strategy:
  name: "macd"
  params:
    # MACD 参数
    fast_period: 5
    slow_period: 10
    signal_period: 9

    # 信号过滤
    volume_confirm: true        # 成交量确认
    volume_threshold: 1.5       # 成交量阈值
    trend_filter: true          # 趋势过滤
    trend_ma_period: 20         # 趋势均线周期

    # 背离检测
    divergence_enabled: true    # 启用背离检测
    divergence_periods: 8       # 背离检测周期数
    divergence_sell_ratio: 0.5  # 背离时只卖出50%仓位

# 风控配置
risk:
  max_position_pct: 0.4         # 单票最大仓位 40%
  max_total_position_pct: 0.9   # 总仓位上限 90%
  position_sizing: "equal"      # equal | kelly | volatility

  stop_loss_pct: 0.08           # 止损 8%
  take_profit_pct: 0.25         # 止盈 25%
  trailing_stop: true           # 移动止损
  trailing_stop_pct: 0.05       # 移动止损回撤 5%

  max_drawdown_pct: 0.15        # 最大回撤 15%
  daily_loss_limit: 0.03        # 日亏损限制 3%

  max_daily_trades: 10          # 日最大交易次数
  min_trade_interval: 300       # 最小交易间隔（秒）

# 交易执行配置
broker:
  type: "simulator"             # simulator | paper | live
  initial_capital: 1000000      # 初始资金 100万

  commission_rate: 0.00008      # 佣金率 万0.8
  min_commission: 5.0           # 最低佣金 5元
  stamp_duty: 0.001             # 印花税 0.1%（卖出）
  slippage: 0.001               # 滑点 0.1%

  order_timeout: 300            # 订单超时（秒）
  partial_fill: true            # 允许部分成交

# 数据源配置
data:
  provider: "akshare"           # tushare | akshare | baostock

  tushare:
    token: "${TUSHARE_TOKEN}"

  cache:
    enabled: true
    db_path: "data/market.db"
    expire_days: 1

  sync:
    auto_sync: true
    sync_on_start: true
    history_days: 365

# 通知配置（本策略的通知方式）
notification:
  enabled: false
  email:
    enabled: true
    recipients:
      - "cloaks@qq.com"
  # Webhook 通知 - 填写你的机器人 URL 即可
  # 支持: 企业微信 / 钉钉 / 飞书群机器人
  webhook:
    url: ""

# 回测配置
backtest:
  start_date: "2024-01-01"
  end_date: "2024-12-31"
  benchmark: "000300.SH"

  output_dir: "output/backtest"
  save_trades: true
  save_positions: true
  generate_report: true
